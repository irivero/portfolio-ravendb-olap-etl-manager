<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Loom/Weaving Pattern - Vertical Threads -->
  <g opacity="0.3">
    <line x1="60" y1="50" x2="60" y2="150" stroke="#3b82f6" stroke-width="2"/>
    <line x1="80" y1="50" x2="80" y2="150" stroke="#3b82f6" stroke-width="2"/>
    <line x1="100" y1="50" x2="100" y2="150" stroke="#3b82f6" stroke-width="2"/>
    <line x1="120" y1="50" x2="120" y2="150" stroke="#3b82f6" stroke-width="2"/>
    <line x1="140" y1="50" x2="140" y2="150" stroke="#3b82f6" stroke-width="2"/>
  </g>
  
  <!-- Loom/Weaving Pattern - Horizontal Threads with Data Flow Effect -->
  <g>
    <path d="M 50 70 Q 100 65 150 70" stroke="#10b981" stroke-width="3" fill="none" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 50 90 Q 100 95 150 90" stroke="#10b981" stroke-width="3" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 50 110 Q 100 105 150 110" stroke="#10b981" stroke-width="3" fill="none" opacity="0.8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M 50 130 Q 100 135 150 130" stroke="#10b981" stroke-width="3" fill="none" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.95;0.4" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Intersection Points (Data Nodes) -->
  <circle cx="60" cy="70" r="4" fill="#60a5fa">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="90" r="4" fill="#60a5fa">
    <animate attributeName="r" values="3;5;3" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="110" r="4" fill="#60a5fa">
    <animate attributeName="r" values="3;5;3" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="130" r="4" fill="#60a5fa">
    <animate attributeName="r" values="3;5;3" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Center Icon - Database/Loom Symbol -->
  <g transform="translate(100, 100)">
    <!-- Database cylinder -->
    <ellipse cx="0" cy="-15" rx="20" ry="7" fill="#3b82f6" opacity="0.8"/>
    <rect x="-20" y="-15" width="40" height="30" fill="#3b82f6" opacity="0.6"/>
    <ellipse cx="0" cy="15" rx="20" ry="7" fill="#3b82f6" opacity="0.9"/>
    
    <!-- Transform arrow -->
    <path d="M 0 20 L 0 35" stroke="#10b981" stroke-width="3" fill="none"/>
    <path d="M -5 30 L 0 35 L 5 30" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
